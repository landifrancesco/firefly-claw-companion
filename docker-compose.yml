services:
  companion:
    build:
      context: .
      args:
        PICOCLAW_IMAGE: ${PICOCLAW_IMAGE:-docker.io/sipeed/picoclaw:latest}
    image: ${COMPOSE_IMAGE_NAME:-firefly-picoclaw-companion:local}
    container_name: ${COMPOSE_PROJECT_NAME:-firefly-picoclaw-companion}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Rome}
      PICOCLAW_PORT: ${PICOCLAW_PORT:-18790}
      PICOCLAW_GATEWAY_HOST: ${PICOCLAW_GATEWAY_HOST:-127.0.0.1}
      PICOCLAW_LOG_LEVEL: ${PICOCLAW_LOG_LEVEL:-info}
      PICOCLAW_HEALTHCHECK_INTERVAL: ${PICOCLAW_HEALTHCHECK_INTERVAL:-30s}
      PICOCLAW_HEALTHCHECK_TIMEOUT: ${PICOCLAW_HEALTHCHECK_TIMEOUT:-15s}
      PICOCLAW_HEALTHCHECK_RETRIES: ${PICOCLAW_HEALTHCHECK_RETRIES:-8}
      PICOCLAW_HEALTHCHECK_START_PERIOD: ${PICOCLAW_HEALTHCHECK_START_PERIOD:-120s}
      PICOCLAW_DEFAULT_MODEL_NAME: ${PICOCLAW_DEFAULT_MODEL_NAME:-gemini}
      PICOCLAW_DEFAULT_MODEL: ${PICOCLAW_DEFAULT_MODEL:-gemini/gemini-2.5-flash}
      PICOCLAW_HOME: /home/picoclaw
      PICOCLAW_WORKSPACE: /home/picoclaw/.picoclaw/workspace
      FIREFLY_BASE_URL: ${FIREFLY_BASE_URL:-http://firefly:8080}
      FIREFLY_API_BASE_PATH: ${FIREFLY_API_BASE_PATH:-/api/v1}
      FIREFLY_ACCESS_TOKEN: ${FIREFLY_ACCESS_TOKEN:-}
      FIREFLY_TIMEOUT_SECONDS: ${FIREFLY_TIMEOUT_SECONDS:-15}
      FIREFLY_REQUEST_RETRIES: ${FIREFLY_REQUEST_RETRIES:-2}
      FIREFLY_RETRY_BACKOFF_SECONDS: ${FIREFLY_RETRY_BACKOFF_SECONDS:-0.5}
      FIREFLY_VERIFY_TLS: ${FIREFLY_VERIFY_TLS:-true}
      FIREFLY_FORCE_CONNECTION_CLOSE: ${FIREFLY_FORCE_CONNECTION_CLOSE:-true}
      FIREFLY_DEFAULT_DRY_RUN: ${FIREFLY_DEFAULT_DRY_RUN:-true}
      FIREFLY_HIGH_VALUE_THRESHOLD: ${FIREFLY_HIGH_VALUE_THRESHOLD:-250.00}
      FIREFLY_DEDUPE_WINDOW_DAYS: ${FIREFLY_DEDUPE_WINDOW_DAYS:-7}
      FIREFLY_ALLOW_DELETE: ${FIREFLY_ALLOW_DELETE:-false}
      FIREFLY_RUNTIME_VERIFY_ON_BOOT: ${FIREFLY_RUNTIME_VERIFY_ON_BOOT:-true}
      FIREFLY_ACCESS_TOKEN_EXPIRES_ON: ${FIREFLY_ACCESS_TOKEN_EXPIRES_ON:-}
      FIREFLY_TOKEN_REMINDER_DAYS: ${FIREFLY_TOKEN_REMINDER_DAYS:-60,30,14,7,3,1}
      FIREFLY_TOKEN_REMINDER_CHECK_INTERVAL_SECONDS: ${FIREFLY_TOKEN_REMINDER_CHECK_INTERVAL_SECONDS:-21600}
      FIREFLY_MAPPINGS_PATH: ${FIREFLY_MAPPINGS_PATH:-/home/picoclaw/.picoclaw/workspace/config/mappings.yml}
      FIREFLY_POLICY_PATH: ${FIREFLY_POLICY_PATH:-/home/picoclaw/.picoclaw/workspace/config/policy.yml}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID:-}
      TELEGRAM_TARGET_ID: ${TELEGRAM_TARGET_ID:-}
      PICOCLAW_TELEGRAM_CHANNEL_ENABLED: ${PICOCLAW_TELEGRAM_CHANNEL_ENABLED:-false}
      FIREFLY_CHAT_LANGUAGE: ${FIREFLY_CHAT_LANGUAGE:-auto}
      FIREFLY_RECEIPT_AI_OCR: ${FIREFLY_RECEIPT_AI_OCR:-true}
      FIREFLY_PDF_OCR_PROVIDER_ENABLED: ${FIREFLY_PDF_OCR_PROVIDER_ENABLED:-true}
      PDFAPIHUB_API_KEY: ${PDFAPIHUB_API_KEY:-}
      PDFAPIHUB_BASE_URL: ${PDFAPIHUB_BASE_URL:-https://pdfapihub.com/api}
      FIREFLY_PDF_OCR_LANG: ${FIREFLY_PDF_OCR_LANG:-ita+eng}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      - "${PICOCLAW_PORT:-18790}:${PICOCLAW_PORT:-18790}"
    volumes:
      - picoclaw_home:/home/picoclaw/.picoclaw
      - picoclaw_workspace:/home/picoclaw/.picoclaw/workspace
      - ./secrets:/run/host-secrets:ro
    networks:
      - firefly_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/firefly-picoclaw/bin/verify_setup.sh --runtime"]
      interval: ${PICOCLAW_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${PICOCLAW_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${PICOCLAW_HEALTHCHECK_RETRIES:-8}
      start_period: ${PICOCLAW_HEALTHCHECK_START_PERIOD:-120s}

  setup:
    build:
      context: .
      args:
        PICOCLAW_IMAGE: ${PICOCLAW_IMAGE:-docker.io/sipeed/picoclaw:latest}
    image: ${COMPOSE_IMAGE_NAME:-firefly-picoclaw-companion:local}
    profiles: ["setup"]
    stdin_open: true
    tty: true
    environment:
      TZ: ${TZ:-Europe/Rome}
      PICOCLAW_HOME: /home/picoclaw
      PICOCLAW_WORKSPACE: /home/picoclaw/.picoclaw/workspace
      SETUP_HOST_ROOT: /host-repo
    volumes:
      - picoclaw_home:/home/picoclaw/.picoclaw
      - picoclaw_workspace:/home/picoclaw/.picoclaw/workspace
      - .:/host-repo
    networks:
      - firefly_net
    entrypoint: ["python3", "/opt/firefly-picoclaw/bin/setup_wizard.py"]

networks:
  firefly_net:
    name: ${FIREFLY_DOCKER_NETWORK:-firefly}
    external: ${FIREFLY_DOCKER_NETWORK_EXTERNAL:-false}

volumes:
  picoclaw_home:
  picoclaw_workspace:
